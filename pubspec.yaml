name: gnome_weather
description: "Material 3 weather app (Strata) for GNOME Wayland."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10
  fl_chart: ^0.69.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shared_preferences: ^2.3.2
  window_manager: ^0.4.2
  tray_manager: ^0.5.3
  path_provider: ^2.1.4

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  shaders:
    - assets/shaders/clouds.frag
  assets:
    - assets/icons/
    - assets/tray/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-400.ttf
          weight: 400
        - asset: assets/fonts/Inter-500.ttf
          weight: 500
        - asset: assets/fonts/Inter-600.ttf
          weight: 600
        - asset: assets/fonts/Inter-700.ttf
          weight: 700
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-600.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-700.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-800.ttf
          weight: 800
